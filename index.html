<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0, user-scalable=no">
  <title>MBTA Nearby</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="home" class="screen">
      <header class="header">
        <h1 id="hdr-title">MBTA Nearby</h1>
        <span class="header-meta status-live" id="status-indicator">&#x25CF; LIVE</span>
        <button class="header-action focusable" id="refresh-btn" data-action="refresh" aria-label="Refresh">&#x21BB;</button>
      </header>

      <div class="content">
        <div id="loading" class="loading-container">
          <div class="loading-spinner"></div>
          <div class="loading-text" id="loading-text">Getting location...</div>
          <div class="loading-sub" id="loading-sub">Finding nearby MBTA stops</div>
        </div>

        <div id="error" class="error-container hidden">
          <div class="error-icon">&#9888;</div>
          <div class="error-message" id="error-message">Something went wrong</div>
          <button class="nav-item focusable" data-action="refresh">Try Again</button>
        </div>

        <div id="station-list" class="station-list hidden"></div>
      </div>

      <div class="scrim-bottom"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>

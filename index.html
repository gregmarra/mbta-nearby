<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1.0">
  <title>MBTA Nearby</title>
  <style>
    /* ── Theme (web-optimized) ── */
    :root {
      /* Backgrounds */
      --t-bg-window: #000000;
      --t-bg-surface: #27282D;
      --t-bg-elevation1: #30333A;
      --t-bg-elevation2: #41454E;
      --t-bg-input-field: #1E1E21;

      /* Surfaces (rgba overlays) */
      --t-surface-default: rgba(255,255,255,0.08);
      --t-surface-focused: rgba(255,255,255,0.16);
      --t-surface-pressed: rgba(255,255,255,0.12);

      /* Text */
      --t-text-primary: #FFFFFF;
      --t-text-secondary: rgba(255,255,255,0.7);
      --t-text-tertiary: rgba(255,255,255,0.5);
      --t-text-accent: #78BEFF;

      /* Icons */
      --t-icon-primary: #FFFFFF;
      --t-icon-secondary: rgba(255,255,255,0.7);
      --t-icon-placeholder: rgba(255,255,255,0.5);

      /* Persistent (status) */
      --t-persistent-action: #2694FE;
      --t-persistent-positive: #26A756;
      --t-persistent-negative: #FF5668;
      --t-persistent-caution: #EB6E00;
      --t-persistent-warning: #C58600;
      --t-persistent-inactive: #8D929D;

      /* Interactive */
      --t-interactive-stroke-highlight: #FFFFFF;
      --t-interactive-stroke-idle: rgba(255,255,255,0);
      --t-interactive-fill-pressed: rgba(255,255,255,0.25);

      /* Border */
      --t-border-primary: rgba(255,255,255,0.25);

      /* Material — container glow */
      --t-material-glow: #6D84A9;
      --t-material-gradient: radial-gradient(
        ellipse 123% 150% at 23% 13%,
        #585E6A 0%, #30333A 33%, #111113 66%, #111113 100%
      );

      /* Spacing */
      --t-sp-2xs: 2px;
      --t-sp-xs: 4px;
      --t-sp-sm: 8px;
      --t-sp-sm-md: 12px;
      --t-sp-md: 16px;
      --t-sp-md-lg: 20px;
      --t-sp-lg: 24px;
      --t-sp-xl: 32px;
      --t-sp-2xl: 40px;

      /* Corner Radius */
      --t-radius-xxs: 8px;
      --t-radius-xs: 16px;
      --t-radius-sm: 24px;
      --t-radius-full: 999px;

      /* Typography */
      --t-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
        'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      --t-weight-regular: 400;
      --t-weight-medium: 500;
      --t-weight-bold: 700;

      /* Opacity */
      --t-disabled-opacity: 0.38;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--t-font);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--t-bg-window);
      color: var(--t-text-primary);
      width: 600px;
      height: 600px;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    .screen { display: none; width: 600px; height: 600px; flex-direction: column; }
    .screen.active { display: flex; }

    /* ── Header (Label Emphasized: 24px/32px w700) ── */
    .header {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 var(--t-sp-lg);
      background: var(--t-bg-surface);
      border-bottom: 1px solid var(--t-border-primary);
      flex-shrink: 0;
      position: relative;
    }
    .header-title {
      font-size: 24px;
      line-height: 32px;
      font-weight: 700;
      color: var(--t-text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-right: 72px;
    }
    .live-dot {
      font-size: 13px;
      color: var(--t-persistent-positive);
      position: absolute;
      right: var(--t-sp-lg);
      top: 50%;
      transform: translateY(-50%);
    }

    /* ── Content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    /* ── Footer ── */
    .footer {
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--t-sp-lg);
      background: var(--t-bg-surface);
      border-top: 1px solid var(--t-border-primary);
      flex-shrink: 0;
      font-size: 18px;
      line-height: 24px;
      font-weight: var(--t-weight-regular);
      color: var(--t-text-tertiary);
    }

    /* ── Station Header ── */
    .station-hdr {
      display: flex;
      align-items: center;
      padding: var(--t-sp-sm-md) var(--t-sp-lg) var(--t-sp-sm);
      background: var(--t-bg-surface);
      border-top: 1px solid var(--t-surface-default);
      box-shadow: 0 4px 16px rgba(0,0,0,0.88);
      position: relative;
      z-index: 1;
    }
    .station-hdr:first-child { border-top: none; }
    .station-name {
      font-size: 28px;
      line-height: 36px;
      font-weight: var(--t-weight-bold);
      color: var(--t-text-primary);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .station-dist {
      font-size: 22px;
      line-height: 28px;
      font-weight: var(--t-weight-regular);
      color: var(--t-text-tertiary);
      margin-left: var(--t-sp-sm);
      flex-shrink: 0;
    }

    /* ── Route Row (Container material) ── */
    .route-badge {
      font-size: 16px;
      line-height: 22px;
      font-weight: var(--t-weight-bold);
      padding: var(--t-sp-2xs) var(--t-sp-sm);
      border-radius: 6px;
      color: var(--t-text-primary);
      flex-shrink: 0;
      min-width: 36px;
      text-align: center;
    }
    .route-row {
      display: flex;
      align-items: center;
      padding: var(--t-sp-sm) var(--t-sp-md) var(--t-sp-sm) var(--t-sp-lg);
      border: 1px solid var(--t-interactive-stroke-idle);
      border-radius: var(--t-radius-xxs);
      margin: var(--t-sp-2xs) var(--t-sp-sm);
      background: transparent;
      gap: var(--t-sp-sm);
      transition: all 200ms ease;
      position: relative;
    }
    .route-row.focused {
      background: var(--t-material-gradient);
      border-color: rgba(255,255,255,0.7);
      border-width: 1.5px;
      box-shadow:
        inset 0 0 20px var(--t-material-glow),
        0 4px 16px rgba(0,0,0,0.88);
    }
    .route-dest {
      font-size: 22px;
      line-height: 28px;
      font-weight: var(--t-weight-regular);
      color: var(--t-text-secondary);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Predictions ── */
    .preds {
      display: flex;
      gap: var(--t-sp-sm-md);
      margin-left: auto;
      flex-shrink: 0;
    }
    .pred-col { text-align: right; min-width: 56px; }
    .pred-label {
      font-size: 18px;
      line-height: 24px;
      font-weight: var(--t-weight-regular);
      color: var(--t-text-tertiary);
    }
    .pred-val {
      font-size: 24px;
      line-height: 32px;
      font-weight: var(--t-weight-bold);
      color: var(--t-text-accent);
    }
    .pred-val.imminent { color: var(--t-persistent-negative); }
    .pred-val.soon { color: var(--t-persistent-caution); }
    .pred-val.none { color: var(--t-persistent-inactive); font-size: 20px; }

    .no-service {
      padding: var(--t-sp-sm-md) var(--t-sp-2xl);
      font-size: 22px;
      line-height: 28px;
      color: var(--t-text-tertiary);
      font-style: italic;
    }

    /* ── Center Messages ── */
    .center-msg {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: var(--t-sp-md);
    }
    .center-msg .icon { font-size: 48px; }
    .center-msg .txt {
      font-size: 28px;
      line-height: 36px;
      font-weight: 400;
      color: var(--t-text-secondary);
    }
    .center-msg .sub {
      font-size: 22px;
      line-height: 28px;
      color: var(--t-text-tertiary);
      max-width: 440px;
      text-align: center;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--t-bg-elevation2);
      border-top-color: var(--t-persistent-action);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pulse { animation: pa 1.5s ease-in-out infinite; }
    @keyframes pa { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

    ::-webkit-scrollbar { width: var(--t-sp-xs); }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--t-bg-elevation2); border-radius: var(--t-sp-2xs); }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="scr-load" class="screen active">
    <div class="center-msg">
      <div class="spinner"></div>
      <div class="txt" id="load-txt">Getting location...</div>
      <div class="sub" id="load-sub">Finding nearby MBTA stops</div>
    </div>
  </div>

  <!-- Main -->
  <div id="scr-main" class="screen">
    <div class="header">
      <div class="header-title" id="hdr-title">MBTA Nearby</div>
      <div class="live-dot pulse" id="live-ind">&#x25CF; LIVE</div>
    </div>
    <div class="content" id="main-content"></div>
    <div class="footer">
      <span>&#x2195; Scroll</span>
    </div>
  </div>

  <!-- Error -->
  <div id="scr-error" class="screen">
    <div class="center-msg">
      <div class="icon">&#x26A0;</div>
      <div class="txt" id="err-txt">Something went wrong</div>
      <div class="sub" id="err-sub"></div>
    </div>
    <div class="footer"><span>&#x23CE; Retry</span></div>
  </div>

<script>
  var API = 'https://api-v3.mbta.com';
  var MOCK_LAT = 42.3936414;
  var MOCK_LON = -71.1223896;
  var NUM_STATIONS = 3;

  // URL param overrides: ?lat=42.39&lon=-71.12
  // When present, skip geolocation entirely (no permission prompt)
  var params = new URLSearchParams(window.location.search);
  var paramOverride = params.has('lat') && params.has('lon');
  if (paramOverride) {
    MOCK_LAT = parseFloat(params.get('lat'));
    MOCK_LON = parseFloat(params.get('lon'));
  }

  var usingMock = false;
  var scr = 'load';
  var uLat = null;
  var uLon = null;
  var placeName = '';
  var stations = [];
  var totalRows = 0;
  var focus = 0;
  var refreshId = null;

  var COLORS = {
    'Red': '#DA291C', 'Mattapan': '#DA291C',
    'Orange': '#ED8B00',
    'Blue': '#003DA5',
    'Green-B': '#00843D', 'Green-C': '#00843D', 'Green-D': '#00843D', 'Green-E': '#00843D'
  };
  var TYPE_COL = { 0: '#00843D', 1: '#DA291C', 2: '#80276C', 3: '#FFC72C', 4: '#008EAA' };

  function show(name) {
    var all = document.querySelectorAll('.screen');
    for (var i = 0; i < all.length; i++) all[i].classList.remove('active');
    document.getElementById('scr-' + name).classList.add('active');
    scr = name;
  }

  function getLoc() {
    return new Promise(function(resolve, reject) {
      if (!navigator.geolocation) { reject(new Error('Geolocation not supported')); return; }
      navigator.geolocation.getCurrentPosition(
        function(p) { resolve({ lat: p.coords.latitude, lon: p.coords.longitude }); },
        function(e) { reject(e); },
        { timeout: 15000, enableHighAccuracy: false }
      );
    });
  }

  // ── Reverse Geocoding (Nominatim / OpenStreetMap) ──
  var geocodedLat = null;
  var geocodedLon = null;

  function reverseGeocode(lat, lon) {
    // Skip if we already geocoded this location
    if (geocodedLat === lat && geocodedLon === lon) return;
    geocodedLat = lat;
    geocodedLon = lon;

    var url = 'https://nominatim.openstreetmap.org/reverse?lat=' + lat +
      '&lon=' + lon + '&format=json&zoom=16';
    fetch(url, { headers: { 'Accept': 'application/json' } })
      .then(function(r) { return r.json(); })
      .then(function(j) {
        var a = j.address || {};
        var neighborhood = a.neighbourhood || a.suburb || '';
        var city = a.city || a.town || a.village || '';
        if (neighborhood && city) {
          placeName = neighborhood + ', ' + city;
        } else {
          placeName = city || neighborhood || '';
        }
        updateHeader();
      })
      .catch(function() { /* silent — header stays as-is */ });
  }

  function updateHeader() {
    var title = 'MBTA Nearby';
    if (placeName) title = 'MBTA \u00B7 ' + placeName;
    document.getElementById('hdr-title').textContent = title;
  }

  function haversine(lat1, lon1, lat2, lon2) {
    var R = 3958.8;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
            Math.sin(dLon/2) * Math.sin(dLon/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function fmtDist(mi) {
    if (mi < 0.1) return Math.round(mi * 5280) + ' ft';
    return mi.toFixed(1) + ' mi';
  }

  function fetchStops(lat, lon) {
    var url = API + '/stops?filter[latitude]=' + lat +
      '&filter[longitude]=' + lon +
      '&filter[radius]=0.02&sort=distance&page[limit]=25' +
      '&fields[stop]=name,latitude,longitude,location_type';
    return fetch(url).then(function(r) { return r.json(); }).then(function(j) {
      var raw = j.data || [];
      var seen = {};
      var out = [];
      for (var i = 0; i < raw.length; i++) {
        var s = raw[i];
        var nm = s.attributes.name;
        if (seen[nm]) continue;
        seen[nm] = true;
        out.push({
          id: s.id, name: nm,
          lat: s.attributes.latitude, lon: s.attributes.longitude,
          d: haversine(lat, lon, s.attributes.latitude, s.attributes.longitude)
        });
      }
      out.sort(function(a, b) { return a.d - b.d; });
      return out.slice(0, NUM_STATIONS);
    });
  }

  function fetchPreds(stopId) {
    var url = API + '/predictions?filter[stop]=' + stopId +
      '&include=route&sort=direction_id,departure_time' +
      '&fields[prediction]=arrival_time,departure_time,direction_id,status' +
      '&fields[route]=long_name,short_name,color,direction_names,direction_destinations,type';
    return fetch(url).then(function(r) { return r.json(); }).then(function(j) {
      var preds = j.data || [];
      var inc = j.included || [];
      var rMap = {};
      for (var i = 0; i < inc.length; i++) {
        if (inc[i].type === 'route') rMap[inc[i].id] = inc[i].attributes;
      }
      var gMap = {};
      var order = [];
      for (var k = 0; k < preds.length; k++) {
        var p = preds[k];
        var rId = p.relationships.route.data.id;
        var dId = p.attributes.direction_id;
        var key = rId + '|' + dId;
        if (!gMap[key]) {
          var rt = rMap[rId] || {};
          var dests = rt.direction_destinations || [];
          var dirs = rt.direction_names || [];
          gMap[key] = {
            rId: rId,
            badge: rt.short_name || rId,
            label: rt.long_name || '',
            color: rt.color ? '#' + rt.color : '#666',
            rType: rt.type,
            dest: dests[dId] || dirs[dId] || (dId === 0 ? 'Outbound' : 'Inbound'),
            ps: []
          };
          order.push(key);
        }
        var t = p.attributes.arrival_time || p.attributes.departure_time;
        gMap[key].ps.push({ time: t, status: p.attributes.status });
      }
      var out = [];
      for (var m = 0; m < order.length; m++) {
        var g = gMap[order[m]];
        g.ps = g.ps.slice(0, 2);
        out.push(g);
      }
      out.sort(function(a, b) {
        if (a.rType !== b.rType) return (a.rType || 99) - (b.rType || 99);
        if (a.rId !== b.rId) return a.rId < b.rId ? -1 : 1;
        return 0;
      });
      return out;
    });
  }

  function fmtTime(p) {
    if (p.status) return p.status;
    if (!p.time) return '---';
    var diff = Math.round((new Date(p.time) - new Date()) / 60000);
    if (diff <= 0) return 'NOW';
    if (diff < 60) return diff + ' min';
    var d = new Date(p.time);
    return d.getHours() + ':' + (d.getMinutes() < 10 ? '0' : '') + d.getMinutes();
  }

  function timeCls(p) {
    if (p.status) return 'imminent';
    if (!p.time) return 'none';
    var diff = Math.round((new Date(p.time) - new Date()) / 60000);
    if (diff <= 1) return 'imminent';
    if (diff <= 5) return 'soon';
    return '';
  }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function render() {
    var el = document.getElementById('main-content');
    var h = '';
    var row = 0;

    for (var si = 0; si < stations.length; si++) {
      var st = stations[si];
      var stop = st.stop;
      var groups = st.groups;

      h += '<div class="station-hdr">' +
           '<div class="station-name">' + esc(stop.name) + '</div>' +
           '<div class="station-dist">' + fmtDist(stop.d) + '</div></div>';

      if (groups.length === 0) {
        h += '<div class="no-service">No upcoming vehicles</div>';
        continue;
      }

      for (var gi = 0; gi < groups.length; gi++) {
        var g = groups[gi];
        var c = COLORS[g.rId] || g.color || TYPE_COL[g.rType] || '#666';

        h += '<div class="route-row' + (row === focus ? ' focused' : '') + '">' +
             '<span class="route-badge" style="background:' + c + ';">' + esc(g.badge) + '</span>' +
             '<span class="route-dest">' + esc(g.dest) + '</span><div class="preds">';

        for (var j = 0; j < 2; j++) {
          if (j < g.ps.length) {
            var lbl = j === 0 ? 'Next' : 'Then';
            h += '<div class="pred-col"><div class="pred-label">' + lbl + '</div>' +
                 '<div class="pred-val ' + timeCls(g.ps[j]) + '">' + fmtTime(g.ps[j]) + '</div></div>';
          } else {
            h += '<div class="pred-col"><div class="pred-label">' + (j === 0 ? 'Next' : 'Then') + '</div>' +
                 '<div class="pred-val none">---</div></div>';
          }
        }

        h += '</div></div>';
        row++;
      }
    }

    totalRows = row;
    el.innerHTML = h;

    var f = el.querySelector('.focused');
    if (f) f.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  document.addEventListener('keydown', function(e) {
    switch (e.key) {
      case 'ArrowUp':
        e.preventDefault();
        if (focus > 0) { focus--; render(); }
        break;
      case 'ArrowDown':
        e.preventDefault();
        if (focus < totalRows - 1) { focus++; render(); }
        break;
      case 'Enter':
        e.preventDefault();
        if (scr === 'error') startApp();
        break;
      case 'Backspace':
      case 'Escape':
        e.preventDefault();
        break;
    }
  });

  function loadAll(lat, lon) {
    document.getElementById('load-txt').textContent = 'Finding stops...';

    return fetchStops(lat, lon).then(function(stops) {
      if (stops.length === 0 && !usingMock) {
        usingMock = true;
        uLat = MOCK_LAT;
        uLon = MOCK_LON;
        document.getElementById('load-sub').textContent = 'Too far from Boston \u2014 using demo location';
        return loadAll(MOCK_LAT, MOCK_LON);
      }
      if (stops.length === 0) {
        show('error');
        document.getElementById('err-txt').textContent = 'No stops found';
        document.getElementById('err-sub').textContent = 'Could not find any MBTA stops.';
        return;
      }

      document.getElementById('load-txt').textContent = 'Loading predictions...';

      var promises = [];
      for (var i = 0; i < stops.length; i++) {
        promises.push(fetchPreds(stops[i].id));
      }

      return Promise.all(promises).then(function(results) {
        stations = [];
        for (var i = 0; i < stops.length; i++) {
          stations.push({ stop: stops[i], groups: results[i] });
        }
        focus = 0;
        show('main');
        render();
        reverseGeocode(lat, lon);

        if (refreshId) clearInterval(refreshId);
        refreshId = setInterval(refreshAll, 30000);
      });
    });
  }

  var MOVE_THRESHOLD = 0.03; // ~150 ft — re-fetch stops if moved this far

  function refreshAll() {
    var ind = document.getElementById('live-ind');
    ind.textContent = '\u21BB';
    ind.classList.remove('pulse');

    // Re-poll location (non-blocking — falls back to current if it fails)
    var locPromise = usingMock
      ? Promise.resolve(null)
      : getLoc().then(function(loc) { return loc; }).catch(function() { return null; });

    locPromise.then(function(loc) {
      var moved = false;
      if (loc) {
        var drift = haversine(uLat, uLon, loc.lat, loc.lon);
        if (drift > MOVE_THRESHOLD) {
          uLat = loc.lat;
          uLon = loc.lon;
          moved = true;
          reverseGeocode(loc.lat, loc.lon);
        }
      }

      if (moved) {
        // Location shifted — reload stops + predictions
        return fetchStops(uLat, uLon).then(function(newStops) {
          if (newStops.length === 0) return refreshPreds();
          var promises = [];
          for (var i = 0; i < newStops.length; i++) {
            promises.push(fetchPreds(newStops[i].id));
          }
          return Promise.all(promises).then(function(results) {
            stations = [];
            for (var i = 0; i < newStops.length; i++) {
              stations.push({ stop: newStops[i], groups: results[i] });
            }
            focus = 0;
            render();
          });
        });
      } else {
        // Same spot — just refresh predictions
        return refreshPreds();
      }
    }).then(function() {
      ind.textContent = '\u25CF LIVE';
      ind.classList.add('pulse');
    }).catch(function() {
      ind.textContent = '\u25CF LIVE';
      ind.classList.add('pulse');
    });
  }

  function refreshPreds() {
    var promises = [];
    for (var i = 0; i < stations.length; i++) {
      promises.push(fetchPreds(stations[i].stop.id));
    }
    return Promise.all(promises).then(function(results) {
      for (var i = 0; i < stations.length; i++) {
        stations[i].groups = results[i];
      }
      var rows = 0;
      for (var j = 0; j < stations.length; j++) {
        rows += stations[j].groups.length;
      }
      if (focus >= rows) focus = Math.max(0, rows - 1);
      render();
    });
  }

  function startApp() {
    show('load');
    usingMock = false;
    document.getElementById('load-txt').textContent = 'Getting location...';
    document.getElementById('load-sub').textContent = 'Finding nearby MBTA stops';

    if (paramOverride) {
      usingMock = true;
      uLat = MOCK_LAT;
      uLon = MOCK_LON;
      return loadAll(MOCK_LAT, MOCK_LON);
    }

    getLoc().then(function(loc) {
      uLat = loc.lat;
      uLon = loc.lon;
      return loadAll(loc.lat, loc.lon);
    }).catch(function() {
      usingMock = true;
      uLat = MOCK_LAT;
      uLon = MOCK_LON;
      document.getElementById('load-sub').textContent = 'Location unavailable \u2014 using demo location';
      return loadAll(MOCK_LAT, MOCK_LON);
    });
  }

  startApp();
</script>
</body>
</html>
